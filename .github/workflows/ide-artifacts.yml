name: Yet AI IDE Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-ide-artifacts:
    name: Build and validate downloadable dev-preview artifacts (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            runner_os: linux
            runner_arch: x64
            with_deps: true
          - os: macos-latest
            label: macos-arm64
            runner_os: macos
            runner_arch: arm64
            with_deps: false
          - os: windows-latest
            label: windows-x64
            runner_os: windows
            runner_arch: x64
            with_deps: false
    env:
      YET_AI_RUNTIME_OS: ${{ matrix.runner_os }}
      YET_AI_RUNTIME_ARCH: ${{ matrix.runner_arch }}
      YET_AI_RUNTIME_RUNNER: ${{ matrix.label }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/gui/package-lock.json
            apps/plugins/vscode/package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.3

      - name: Install root dependencies
        shell: bash
        run: npm ci

      - name: Install Playwright Chromium
        if: matrix.with_deps
        shell: bash
        run: npx playwright install --with-deps chromium

      - name: Install Playwright Chromium (no system deps)
        if: ${{ !matrix.with_deps }}
        shell: bash
        run: npx playwright install chromium

      - name: Install GUI dependencies
        shell: bash
        run: npm ci
        working-directory: apps/gui

      - name: Install VS Code plugin dependencies
        shell: bash
        run: npm ci
        working-directory: apps/plugins/vscode

      - name: Toolchain diagnostics
        shell: bash
        run: |
          set -euxo pipefail
          pwd
          node --version
          npm --version
          rustc --version
          cargo --version
          which cargo
          command -v cargo
          java -version
          gradle --version

      - name: Prepare IDE engine
        shell: bash
        run: |
          set -euxo pipefail
          export PATH="$HOME/.cargo/bin:$PATH"
          npm run prepare:ide-engine
          if [ "${{ matrix.runner_os }}" = "windows" ]; then
            test -f target/debug/yet-lsp.exe
            test -f apps/plugins/vscode/bin/yet-lsp.exe
          else
            test -f target/debug/yet-lsp
            test -f apps/plugins/vscode/bin/yet-lsp
          fi

      - name: Build and validate downloadable dev-preview artifacts
        shell: bash
        run: |
          set -euxo pipefail
          export PATH="$HOME/.cargo/bin:$PATH"
          npm run prepare:jetbrains-preview -- --skip-engine-prepare
          npm run prepare:vscode-preview -- --skip-engine-prepare
          npm run smoke:installed-plugin-chat-visual
          npm run smoke:plugin-layout
          npm run smoke:vscode-first-message
          npm run smoke:jetbrains-first-message
          npm run smoke:vscode-installable
          npm run smoke:vscode-preview
          npm run smoke:vscode-wrapper-browser
          npm run smoke:jetbrains-installable
          npm run smoke:jetbrains-bundled-runtime
          npm run smoke:jetbrains-preview
          npm run smoke:jetbrains-gui-browser
          npm run smoke:jetbrains-wrapper-browser
          npm run artifact:manifest -- --require vscode,jetbrains
          npm run artifact:stage-github
          npm run smoke:github-ide-artifacts

      - name: Summarize expected public IDE artifacts
        shell: bash
        run: npm run artifact:github-summary -- --sha "${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"

      # GitHub wraps every uploaded artifact in its own ZIP. The VS Code
      # artifact must be unzipped before IDE install.
      - name: Upload VS Code artifact (unzip GitHub artifact first)
        uses: actions/upload-artifact@v4
        with:
          name: yet-ai-vscode-unzip-first-${{ matrix.label }}-${{ github.sha }}
          if-no-files-found: error
          path: dist/github-artifacts/vscode-unzip-first/*

      # This staging layout makes the GitHub artifact ZIP itself installable in
      # JetBrains, so do not unzip it before installing from disk.
      - name: Upload JetBrains direct-install artifact
        uses: actions/upload-artifact@v4
        with:
          name: yet-ai-jetbrains-install-direct-${{ matrix.label }}-${{ github.sha }}
          if-no-files-found: error
          path: dist/github-artifacts/jetbrains-install-direct/*

      - name: Clean tracked status
        shell: bash
        run: |
          status="$(git status --short --untracked-files=no)"
          if [ -n "$status" ]; then
            printf '%s\n' "$status"
            exit 1
          fi
          echo "Tracked git status is clean."

  combine-manifests:
    name: Combine per-platform manifests
    needs: build-ide-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/gui/package-lock.json
            apps/plugins/vscode/package-lock.json

      - name: Download all per-platform VS Code artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/combined-per-platform
          pattern: yet-ai-vscode-unzip-first-*

      - name: Combine per-platform manifests
        shell: bash
        run: |
          mkdir -p dist/combined-plugin-manifest
          node scripts/combine-plugin-artifact-manifests.mjs \
            --input dist/combined-per-platform \
            --output dist/combined-plugin-manifest/manifest.json

      - name: Upload combined plugin artifact manifest
        uses: actions/upload-artifact@v4
        with:
          name: yet-ai-plugin-manifest-${{ github.sha }}
          if-no-files-found: error
          path: dist/combined-plugin-manifest/manifest.json
