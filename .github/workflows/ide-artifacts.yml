name: Yet AI IDE Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-ide-artifacts:
    name: Build and validate downloadable dev-preview artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/gui/package-lock.json
            apps/plugins/vscode/package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.3

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Install GUI dependencies
        run: npm ci
        working-directory: apps/gui

      - name: Install VS Code plugin dependencies
        run: npm ci
        working-directory: apps/plugins/vscode

      - name: Build and validate downloadable dev-preview artifacts
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          npm run prepare:vscode-preview
          npm run smoke:vscode-installable
          npm run smoke:vscode-preview
          npm run smoke:vscode-wrapper-browser
          npm run smoke:vscode-first-message
          npm run prepare:jetbrains-preview
          npm run smoke:jetbrains-installable
          npm run smoke:jetbrains-preview
          npm run smoke:jetbrains-gui-browser
          npm run smoke:jetbrains-wrapper-browser
          npm run smoke:jetbrains-first-message
          npm run artifact:manifest -- --require vscode,jetbrains
          npm run artifact:stage-github
          npm run smoke:github-ide-artifacts

      # GitHub wraps every uploaded artifact in its own ZIP. The VS Code and
      # JetBrains unzip-first artifacts must be unzipped before IDE install.
      - name: Upload VS Code artifact (unzip GitHub artifact first)
        uses: actions/upload-artifact@v4
        with:
          name: yet-ai-vscode-unzip-first-${{ github.sha }}
          if-no-files-found: error
          path: dist/github-artifacts/vscode-unzip-first/*

      - name: Upload JetBrains artifact (unzip GitHub artifact first)
        uses: actions/upload-artifact@v4
        with:
          name: yet-ai-jetbrains-unzip-first-${{ github.sha }}
          if-no-files-found: error
          path: dist/github-artifacts/jetbrains-unzip-first/*

      # This staging layout makes the GitHub artifact ZIP itself installable in
      # JetBrains, so do not unzip it before installing from disk.
      - name: Upload JetBrains direct-install artifact
        uses: actions/upload-artifact@v4
        with:
          name: yet-ai-jetbrains-install-direct-${{ github.sha }}
          if-no-files-found: error
          path: dist/github-artifacts/jetbrains-install-direct/*

      - name: Upload plugin artifact manifest
        uses: actions/upload-artifact@v4
        with:
          name: yet-ai-plugin-manifest-${{ github.sha }}
          if-no-files-found: error
          path: dist/github-artifacts/manifest/*

      - name: Clean tracked status
        run: |
          status="$(git status --short --untracked-files=no)"
          if [ -n "$status" ]; then
            printf '%s\n' "$status"
            exit 1
          fi
          echo "Tracked git status is clean."
