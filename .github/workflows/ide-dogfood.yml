name: Yet AI Manual IDE Dogfood

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ide-dogfood:
    name: Manual local-mock IDE dogfood
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/gui/package-lock.json
            apps/plugins/vscode/package-lock.json

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.3

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright Chromium dependencies
        run: npx playwright install --with-deps chromium

      - name: Install GUI dependencies
        run: npm ci
        working-directory: apps/gui

      - name: Install VS Code plugin dependencies
        run: npm ci
        working-directory: apps/plugins/vscode

      - name: Verify Gradle availability
        run: gradle --version

      - name: IDE dogfood gate
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          npm run smoke:ide-dogfood

      - name: Cross-IDE preview gate
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          npm run smoke:ide-preview

      - name: Repository validation
        run: npm run check

      - name: Clean tracked status
        run: |
          status="$(git status --short --untracked-files=no)"
          if [ -n "$status" ]; then
            printf '%s\n' "$status"
            exit 1
          fi
          echo "Tracked git status is clean."
